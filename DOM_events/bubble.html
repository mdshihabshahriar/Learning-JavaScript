<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubble</title>
    <style>
        body{
            border: 2px solid red;
            margin: 2px;
        }
        section{
            border: 2px solid green;
            margin: 2px;
        }
        ol{
            border: 2px solid purple;
            margin: 2px;
        }
        li{
            border: 2px solid blue;

        }
    </style>
</head>
<body id="body">
    <h1>Explore Event Bubble</h1>
    <section id="section-container">
        <h3>List of things</h3>
        <ol id="item-list">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Vero, laboriosam!</li>
            <li id="item-3">Numquam, quis?</li>
            <li id="item-4">Consectetur, laudantium.</li>
            <li id="item-5">Alias, dolores?</li>
            <li id="item-6">Necessitatibus, voluptas?</li>
        </ol>
    </section>


    <script>
        document.getElementById('item-2').addEventListener('click',function(event){
            console.log(2)
            event.stopImmediatePropagation()
        })
        document.getElementById('item-2').addEventListener('click',function(event){
            console.log('2 second click')
            event.stopPropagation()
        })
        document.getElementById('item-list').addEventListener('click',function(){
            console.log('ol')
        })
        document.getElementById('section-container').addEventListener('click',function(){
            console.log('section')
        })
        document.getElementById('body').addEventListener('click',function(){
            console.log('body')
        })
    </script>
</body>
</html>
